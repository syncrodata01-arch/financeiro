<!DOCTYPE html><html lang="pt-br"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Financeiro Nuvem</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #e0f2f7; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; background: #0284c7; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head><body>

    <div id="login" class="card">
        <h1>💰 Elite Pay</h1>
        <p>Acesse seu financeiro na nuvem</p>
        <button class="btn" onclick="login()">Entrar com Google</button>
    </div>

    <div id="app" class="card hidden">
        <h2>Bem-vindo!</h2>
        <input type="text" id="desc" placeholder="Descrição do gasto">
        <input type="number" id="valor" placeholder="R$ 0,00">
        <button class="btn" onclick="salvar()">Salvar na Nuvem</button>
        <hr>
        <div id="lista"></div>
        <button onclick="auth.signOut().then(()=>location.reload())">Sair</button>
    </div>

<script>
    // PASSO 2: COLE SEUS DADOS AQUI EMBAIXO
    const firebaseConfig = {
      apiKey: "AIzaSyChMGXis1M7GrkJWDUpX_Sa2LLpioFvMpA",
      authDomain: "financeiro-completo-90628.firebaseapp.com",
      projectId: "financeiro-completo-90628",
      storageBucket: "financeiro-completo-90628.firebasestorage.app",
      messagingSenderId: "416233072551",
      appId: "1:416233072551:web:88e135b34d1a73347af882"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function login() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(() => {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            carregarDados();
        }).catch(err => alert("Erro ao logar: " + err.message));
    }

    function salvar() {
        const desc = document.getElementById('desc').value;
        const valor = document.getElementById('valor').value;
        db.collection("usuarios").doc(auth.currentUser.uid).collection("gastos").add({
            desc, valor, data: new Date()
        }).then(() => {
            alert("Salvo com sucesso!");
            carregarDados();
        });
    }

    function carregarDados() {
        db.collection("usuarios").doc(auth.currentUser.uid).collection("gastos").get().then(snap => {
            let html = "";
            snap.forEach(doc => {
                const g = doc.data();
                html += `<p>${g.desc} - R$ ${g.valor}</p>`;
            });
            document.getElementById('lista').innerHTML = html;
        });
    }
</script></body></html>
